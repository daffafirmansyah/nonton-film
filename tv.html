<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Series - BerMovie</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Righteous&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎬</text></svg>">
    <link rel="stylesheet" href="style.v12.css?v=8">
    <link rel="stylesheet" href="modern.css?v=3">

<style>

</style>
</head>
<body>
<div class="scroll-progress" id="scrollProgress"></div>

    <nav class="navbar">
        <div class="nav-container">
            <a href="./" class="logo">BerMovie</a>
            <div class="nav-search">
                <input type="text" id="searchInput" placeholder="Cari series..." autocomplete="off">
                <button id="searchBtn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></button>
            </div>
                        <div class="nav-links">
                <a href="./">Home</a>
                <a href="movies.html">Film</a>
                <a href="tv.html">Series</a>
                <div class="nav-dropdown">
                    <span class="nav-dropdown-trigger">Genre ▾</span>
                    <div class="dropdown-menu" id="genreDropdown"></div>
                </div>
                <div class="nav-dropdown">
                    <span class="nav-dropdown-trigger">Country ▾</span>
                    <div class="dropdown-menu" id="countryDropdown"></div>
                </div>
                <div class="nav-dropdown">
                    <span class="nav-dropdown-trigger">Tahun ▾</span>
                    <div class="dropdown-menu" id="yearDropdown"></div>
                </div>
                <a href="./?watchlist" class="nav-fav">Favorit</a>
            </div>
            <button class="mobile-menu-btn" id="mobileMenuBtn" style="cursor:pointer;z-index:101;position:relative"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="pointer-events:none"><path d="M3 12h18M3 6h18M3 18h18"/></svg></button>
        </div>
        <div class="mobile-menu" id="mobileMenu">
            <a href="./">Home</a>
            <a href="movies.html">Film</a>
            <a href="tv.html" class="active">Series</a>
            <a href="genre.html">Genre</a>
            <a href="leaderboard.html">Peringkat</a>
            <a href="movies.html" data-nav="tahun">Tahun</a>
            <a href="movies.html" data-nav="country">Country</a>
            <a href="./?watchlist">Favorit</a>
        </div>
    </nav>

    <main class="main-content page-content">
        <h1 class="page-title">Series</h1>
        
        <div class="filters">
            <select id="sortFilter">
                <option value="popularity.desc">Populer</option>
                <option value="vote_average.desc&vote_count.gte=500">Rating Tertinggi</option>
                <option value="first_air_date.desc">Terbaru</option>
            </select>
            <select id="genreFilter"></select>
            <select id="yearFilter">
                <option value="">Semua Tahun</option>
            </select>
            <select id="countryFilter"></select>
            <select id="networkFilter"></select>
        </div>

        <div class="grid" id="tvGrid"></div>
        <div class="pagination" id="tvPagination"></div>
        <div class="loading hidden" id="loading">Memuat...</div>
    </main>

    <!-- DETAIL MODAL -->
    <div class="modal hidden" id="detailModal">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
            <button class="modal-close">&times;</button>
            <div class="modal-hero" id="modalHero"></div>
            <div class="modal-body">
                <h2 id="modalTitle"></h2>
                <div class="modal-meta" id="modalMeta"></div>
                <p class="modal-overview" id="modalOverview"></p>
                <div class="modal-cast" id="modalCast"></div>
                <div class="modal-actions">
                    <button class="btn-watch" id="modalWatchBtn">Tonton</button>
                    <button class="btn-secondary trailer-btn" id="modalTrailerBtn"><span class="t-il"></span><span class="t-txt">Trailer</span><span class="t-ir">▶</span></button>
                </div>
                <div class="seasons-section hidden" id="seasonsSection">
                    <h3>Seasons</h3>
                    <div class="seasons-list" id="seasonsList"></div>
                </div>
                <div class="similar-section">
                    <h3>Rekomendasi</h3>
                    <div class="carousel" id="similarCarousel"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- PLAYER MODAL -->
    <div class="player-modal hidden" id="playerModal">
        <div class="player-backdrop"></div>
        <div class="player-content">
            <div class="player-top">
                <button class="player-back" id="playerBackBtn">&larr;</button>
                <span class="player-title" id="playerTitle"></span>
                <div class="player-top-right">
                    <button class="player-eps-btn hidden" id="playerEpsBtn">&#9776;</button>
                    <button class="player-close" id="playerCloseBtn">&times;</button>
                </div>
            </div>
            <div class="iframe-container">
                <iframe id="playerFrame" src="" frameborder="0" allowfullscreen></iframe>
                <div class="player-controls" id="playerControls">
                    <div class="player-servers" id="playerServers">
                        <button class="svr-btn active" data-server="apiplayer">ApiPlayer <small>Sub Indo</small></button>
                        <button class="svr-btn" data-server="2embed">2Embed <small>1080p</small></button>
                        <button class="svr-btn" data-server="vesy">Vesy</button>
                        <button class="svr-btn" data-server="vixsrc">VixSrc</button>

                    </div>
                </div>
            </div>
            <div class="episode-sheet hidden" id="episodeSheet">
                <div class="ep-sheet-handle"></div>
                <div class="ep-sheet-header">
                    <h4>Episode</h4>
                    <button class="ep-sheet-close" id="epSheetClose">&times;</button>
                </div>
                <select id="seasonSelect" class="ep-season-select"></select>
                <div class="episodes-grid" id="episodesGrid"></div>
            </div>
        </div>
    </div>


        <!-- SEARCH RESULTS -->
        <section class="section hidden" id="searchResults">
            <h2 class="section-title" id="searchTitle">Hasil Pencarian</h2>
            <div class="grid" id="searchGrid"></div>
            <div class="pagination" id="searchPagination"></div>
        </section>
<button class="back-top" id="backTop">&uarr;</button>
<div class="toast" id="toast"></div>
    <footer class="site-footer">
        <p>BerMovie — Streaming Film & Series Sub Indo</p>
    </footer>

    <script src="main.v17.js?v=3"></script>
</body>
</html>
