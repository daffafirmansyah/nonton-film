<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peringkat - NontonFilm</title>
    <meta name="description" content="Peringkat film dan series terbaik.">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.v2.css?v=7">
    <style>
        .lb-page { padding-top: var(--nav-height); }
        .lb-header {
            max-width: var(--max-w); margin: 0 auto;
            padding: 32px 20px 8px;
        }
        .lb-header h1 { font-size: 1.5rem; font-weight: 800; }
        .lb-header p { color: var(--text3); font-size: 0.85rem; margin-top: 4px; }
        .lb-tabs {
            display: flex; gap: 6px; flex-wrap: wrap;
            max-width: var(--max-w); margin: 0 auto;
            padding: 16px 20px 8px;
        }
        .lb-tab {
            padding: 8px 18px; border-radius: 20px;
            font-size: 0.82rem; font-weight: 600;
            background: var(--bg-card); border: 1px solid var(--border);
            color: var(--text2); cursor: pointer; transition: var(--transition);
        }
        .lb-tab:hover { background: var(--bg-hover); color: var(--text); }
        .lb-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
        .lb-section { display: none; }
        .lb-section.active { display: block; }
        .lb-list {
            max-width: var(--max-w); margin: 0 auto;
            padding: 8px 20px 40px;
            display: flex; flex-direction: column; gap: 8px;
        }
        .lb-item {
            display: flex; align-items: center; gap: 14px;
            padding: 10px 14px;
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius);
            cursor: pointer; transition: var(--transition);
        }
        .lb-item:hover { background: var(--bg-hover); border-color: rgba(255,255,255,0.1); }
        .lb-rank {
            width: 32px; height: 32px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.8rem; font-weight: 800; flex-shrink: 0;
            background: var(--bg-elevated); color: var(--text3);
        }
        .lb-item:nth-child(1) .lb-rank { background: #f5a623; color: #000; }
        .lb-item:nth-child(2) .lb-rank { background: #b0b0b8; color: #000; }
        .lb-item:nth-child(3) .lb-rank { background: #cd7f32; color: #000; }
        .lb-item:nth-child(n+4) .lb-rank { background: var(--bg-elevated); color: var(--text3); }
        .lb-poster {
            width: 40px; height: 60px; border-radius: 6px;
            object-fit: cover; flex-shrink: 0;
            background: var(--bg-elevated);
        }
        .lb-info { flex: 1; min-width: 0; }
        .lb-info strong { display: block; font-size: 0.88rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .lb-info small { color: var(--text3); font-size: 0.75rem; }
        .lb-rating { font-size: 0.8rem; font-weight: 700; color: #f5a623; flex-shrink: 0; }
        .lb-loading {
            padding: 60px 20px; text-align: center; color: var(--text3);
            max-width: var(--max-w); margin: 0 auto;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="./" class="logo">NontonFilm</a>
            <div class="nav-search">
                <input type="text" id="searchInput" placeholder="Cari film atau series..." autocomplete="off">
                <button id="searchBtn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></button>
            </div>
            <div class="nav-links">
                <a href="./">Home</a>
                <a href="movies.html">Film</a>
                <a href="tv.html">Series</a>
                <a href="genre.html">Genre</a>
                <a href="leaderboard.html" class="active">Peringkat</a>
            </div>
            <button class="mobile-menu-btn" id="mobileMenuBtn" style="cursor:pointer;z-index:101;position:relative"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="pointer-events:none"><path d="M3 12h18M3 6h18M3 18h18"/></svg></button>
        </div>
        <div class="mobile-menu" id="mobileMenu"><div class="mobile-menu-inner">
            <a href="./">Home</a>
            <a href="movies.html">Film</a>
            <a href="tv.html">Series</a>
            <a href="genre.html">Genre</a>
            <a href="leaderboard.html" class="active">Peringkat</a>
        </div></div>
    </nav>

    <div class="lb-page">
        <div class="lb-header">
            <h1>Peringkat</h1>
            <p>Film dan series terbaik berdasarkan rating dan popularitas</p>
        </div>

        <div class="lb-tabs" id="lbTabs">
            <button class="lb-tab active" data-section="trending">Trending</button>
            <button class="lb-tab" data-section="movieTop">Film Terbaik</button>
            <button class="lb-tab" data-section="tvTop">Series Terbaik</button>
            <button class="lb-tab" data-section="moviePop">Film Populer</button>
            <button class="lb-tab" data-section="tvPop">Series Populer</button>
        </div>

        <div id="lbTrending" class="lb-section active"><div class="lb-list" id="trendingList"></div></div>
        <div id="lbMovieTop" class="lb-section"><div class="lb-list" id="movieTopList"></div></div>
        <div id="lbTvTop" class="lb-section"><div class="lb-list" id="tvTopList"></div></div>
        <div id="lbMoviePop" class="lb-section"><div class="lb-list" id="moviePopList"></div></div>
        <div id="lbTvPop" class="lb-section"><div class="lb-list" id="tvPopList"></div></div>

        <div class="lb-loading hidden" id="lbLoading">Memuat...</div>
    </div>

    <!-- PLAYER MODAL -->
    <div class="player-modal hidden" id="playerModal">
        <div class="player-backdrop"></div>
        <div class="player-content">
            <div class="player-header">
                <h3 id="playerTitle"></h3>
                <div class="player-servers">
                    <span>Server:</span>
                    <button class="server-btn active" data-server="vidsrc">VidSrc</button>
                    <button class="server-btn" data-server="vidsrc2">VidSrc.su</button>
                    <button class="server-btn" data-server="2embed">2Embed</button>
                </div>
                <button class="player-close">&times;</button>
            </div>
            <div class="episode-selector hidden" id="episodeSelector">
                <select id="seasonSelect"></select>
                <div class="episodes-grid" id="episodesGrid"></div>
            </div>
            <div class="iframe-container">
                <iframe id="playerFrame" src="" frameborder="0" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <footer class="site-footer">
        <p>NontonFilm — Streaming Film & Series Sub Indo</p>
    </footer>

    <script src="main.js?v=5"></script>
    <script>
        // LEADERBOARD
        const LB_LISTS = ['trendingList','movieTopList','tvTopList','moviePopList','tvPopList'];

        async function loadLB() {
            const loading = document.getElementById('lbLoading');
            loading?.classList.remove('hidden');

            const [trending, movieTop, tvTop, moviePop, tvPop] = await Promise.all([
                tmdb('/trending/all/day'),
                tmdb('/movie/top_rated'),
                tmdb('/tv/top_rated'),
                tmdb('/movie/popular'),
                tmdb('/tv/popular')
            ]);

            loading?.classList.add('hidden');

            renderLBList('trendingList', trending?.results?.slice(0, 20));
            renderLBList('movieTopList', movieTop?.results?.slice(0, 20), 'movie');
            renderLBList('tvTopList', tvTop?.results?.slice(0, 20), 'tv');
            renderLBList('moviePopList', moviePop?.results?.slice(0, 20), 'movie');
            renderLBList('tvPopList', tvPop?.results?.slice(0, 20), 'tv');
        }

        function renderLBList(containerId, items, forceType) {
            const list = document.getElementById(containerId);
            if (!list) return;
            list.innerHTML = '';
            if (!items) return;

            items.forEach((item, i) => {
                const type = forceType || item.media_type || 'movie';
                const title = item.title || item.name || 'Untitled';
                const date = item.release_date || item.first_air_date;
                const div = document.createElement('div');
                div.className = 'lb-item';
                div.innerHTML = `
                    <div class="lb-rank">${i + 1}</div>
                    <img class="lb-poster" src="${posterUrl(item.poster_path)}" alt="" loading="lazy" onerror="this.src='${NO_POSTER}'">
                    <div class="lb-info">
                        <strong>${title}</strong>
                        <small>${year(date)} · ${type === 'movie' ? 'Film' : 'Series'}</small>
                    </div>
                    <span class="lb-rating">★ ${rating(item.vote_average)}</span>
                `;
                div.onclick = () => window.location.href = `detail.html?id=${item.id}&type=${type}`;
                list.appendChild(div);
            });
        }

        // Tab switching
        document.querySelectorAll('.lb-tab').forEach(tab => {
            tab.onclick = () => {
                document.querySelectorAll('.lb-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                document.querySelectorAll('.lb-section').forEach(s => s.classList.remove('active'));
                const section = document.getElementById('lb' + tab.dataset.section.charAt(0).toUpperCase() + tab.dataset.section.slice(1));
                if (section) section.classList.add('active');
            };
        });

        document.addEventListener('DOMContentLoaded', () => {
            initGlobalEvents();
            loadLB();
        });
    </script>
</body>
</html>
