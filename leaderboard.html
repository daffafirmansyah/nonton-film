    <style>
        .lb-page { padding-top: var(--nav-height); }
        .lb-header {
            max-width: var(--max-w); margin: 0 auto;
            padding: 32px 20px 8px;
        }
        .lb-header h1 { font-size: 1.5rem; font-weight: 800; }
        .lb-header p { color: var(--text3); font-size: 0.85rem; margin-top: 4px; }
        .lb-tabs {
            display: flex; gap: 6px; flex-wrap: wrap;
            max-width: var(--max-w); margin: 0 auto;
            padding: 16px 20px 8px;
        }
        .lb-tab {
            padding: 8px 18px; border-radius: 20px;
            font-size: 0.82rem; font-weight: 600;
            background: var(--bg-card); border: 1px solid var(--border);
            color: var(--text2); cursor: pointer; 
        }
        .lb-tab:hover { background: var(--bg-hover); color: var(--text); }
        .lb-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
        .lb-section { display: none; }
        .lb-section.active { display: block; }
        .lb-list {
            max-width: var(--max-w); margin: 0 auto;
            padding: 8px 20px 40px;
            display: flex; flex-direction: column; gap: 8px;
        }
        .lb-item {
            display: flex; align-items: center; gap: 14px;
            padding: 10px 14px;
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius);
            cursor: pointer; 
        }
        .lb-item:hover { background: var(--bg-hover); border-color: rgba(255,255,255,0.1); }
        .lb-rank {
            width: 32px; height: 32px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.8rem; font-weight: 800; flex-shrink: 0;
            background: var(--bg-elevated); color: var(--text3);
        }
        .lb-item:nth-child(1) .lb-rank { background: #f5a623; color: #000; }
        .lb-item:nth-child(2) .lb-rank { background: #b0b0b8; color: #000; }
        .lb-item:nth-child(3) .lb-rank { background: #cd7f32; color: #000; }
        .lb-item:nth-child(n+4) .lb-rank { background: var(--bg-elevated); color: var(--text3); }
        .lb-poster {
            width: 40px; height: 60px; border-radius: 6px;
            object-fit: cover; flex-shrink: 0;
            background: var(--bg-elevated);
        }
        .lb-info { flex: 1; min-width: 0; }
        .lb-info strong { display: block; font-size: 0.88rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .lb-info small { color: var(--text3); font-size: 0.75rem; }
        .lb-rating { font-size: 0.8rem; font-weight: 700; color: #f5a623; flex-shrink: 0; }
        .lb-loading {
            padding: 60px 20px; text-align: center; color: var(--text3);
            max-width: var(--max-w); margin: 0 auto;
        }
    </style>

    <script>
        // LEADERBOARD
        const LB_LISTS = ['trendingList','movieTopList','tvTopList','moviePopList','tvPopList'];

        async function loadLB() {
            const loading = document.getElementById('lbLoading');
            loading?.classList.remove('hidden');

            const [trending, movieTop, tvTop, moviePop, tvPop] = await Promise.all([
                tmdb('/trending/all/day'),
                tmdb('/movie/top_rated'),
                tmdb('/tv/top_rated'),
                tmdb('/movie/popular'),
                tmdb('/tv/popular')
            ]);

            loading?.classList.add('hidden');

            renderLBList('trendingList', trending?.results?.slice(0, 20));
            renderLBList('movieTopList', movieTop?.results?.slice(0, 20), 'movie');
            renderLBList('tvTopList', tvTop?.results?.slice(0, 20), 'tv');
            renderLBList('moviePopList', moviePop?.results?.slice(0, 20), 'movie');
            renderLBList('tvPopList', tvPop?.results?.slice(0, 20), 'tv');
        }

        function renderLBList(containerId, items, forceType) {
            const list = document.getElementById(containerId);
            if (!list) return;
            list.innerHTML = '';
            if (!items) return;

            items.forEach((item, i) => {
                const type = forceType || item.media_type || 'movie';
                const title = item.title || item.name || 'Untitled';
                const date = item.release_date || item.first_air_date;
                const div = document.createElement('div');
                div.className = 'lb-item';
                div.innerHTML = `
                    <div class="lb-rank">${i + 1}</div>
                    <img class="lb-poster" src="${posterUrl(item.poster_path)}" alt="" loading="lazy" onerror="this.src='${NO_POSTER}'">
                    <div class="lb-info">
                        <strong>${title}</strong>
                        <small>${year(date)} · ${type === 'movie' ? 'Film' : 'Series'}</small>
                    </div>
                    <span class="lb-rating">★ ${rating(item.vote_average)}</span>
                `;
                div.onclick = () => window.location.href = `detail.html?id=${item.id}&type=${type}`;
                list.appendChild(div);
            });
        }

        // Tab switching
        document.querySelectorAll('.lb-tab').forEach(tab => {
            tab.onclick = () => {
                document.querySelectorAll('.lb-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                document.querySelectorAll('.lb-section').forEach(s => s.classList.remove('active'));
                const section = document.getElementById('lb' + tab.dataset.section.charAt(0).toUpperCase() + tab.dataset.section.slice(1));
                if (section) section.classList.add('active');
            };
        });

        document.addEventListener('DOMContentLoaded', () => {
            initGlobalEvents();
            loadLB();
        });
    </script>
