<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail - BerMovie</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Righteous&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎬</text></svg>">
    <link rel="stylesheet" href="style.v12.css?v=14">
<link rel="stylesheet" href="modern.css?v=7">
<style>
.mobile-menu{position:fixed;top:64px;left:0;right:0;height:calc(100vh - 64px);height:calc(100dvh - 64px);background:rgba(12,12,18,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);z-index:99;overflow-y:auto;-webkit-overflow-scrolling:touch;transform:translateX(100%);transition:transform .3s ease;box-shadow:-4px 0 30px rgba(0,0,0,.5)}.mobile-menu.open{transform:translateX(0)}.mobile-menu a{display:flex;align-items:center;gap:14px;padding:16px 20px;font-size:.95rem;font-weight:600;color:#e8e8ef;touch-action:manipulation;border-bottom:1px solid rgba(255,255,255,.04);text-decoration:none}.mobile-menu a:last-child{border-bottom:none}.mobile-menu a:active{background:rgba(255,255,255,.03)}.mobile-menu a.active{background:rgba(249,115,22,.08);border-left:3px solid var(--accent);color:#fff;padding-left:17px}.mobile-search{display:flex;padding:12px 16px;gap:8px}.mobile-search input{flex:1;height:38px;padding:0 14px;border-radius:10px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.06);color:#fff;font-size:.85rem;outline:none;font-family:inherit}.mobile-search input:focus{border-color:var(--accent)}.mobile-search button{padding:0 16px;border-radius:10px;background:var(--accent);color:#fff;font-size:.82rem;font-weight:600;border:none;cursor:pointer;font-family:inherit}
</style>
    <style>
        .detail-page { padding-top: var(--nav-height); }
        .detail-hero {
            width: 100%; height: 50vh; min-height: 350px;
            background-size: cover; background-position: center 20%;
            position: relative;
        }
        .detail-cast::-webkit-scrollbar { height: 2px; }
        .detail-cast-item { flex: 0 0 70px; text-align: center; }
        .detail-cast-item img {
            width: 56px; height: 56px; border-radius: 50%; object-fit: cover;
            margin-bottom: 6px; background: #1a1a2e;
            border: 2px solid rgba(255,255,255,0.06);
        }
        .detail-cast-item p {
            font-size: 0.7rem; color: var(--text3);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .detail-loading {
            padding-top: calc(var(--nav-height) + 80px);
            text-align: center; color: var(--text3);
        }
        .back-btn {
            position: absolute; top: 20px; left: 20px; z-index: 10;
            width: 44px; height: 44px; border-radius: 50%;
            background: rgba(0,0,0,0.6); color: white; font-size: 1.3rem;
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer; transition: all 0.2s;
        }
        .back-btn:hover { background: var(--accent); }
        @media (max-width: 768px) {
            .detail-hero { height: 35vh; min-height: 250px; }
            .detail-body { padding: 0 12px 40px; margin-top: -40px; }
            .back-btn { top: 12px; left: 12px; width: 36px; height: 36px; font-size: 1rem; }
        }
        .seasons-list {
            display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px;
        }
        .season-card {
            display: flex; align-items: center; gap: 10px; padding: 10px 14px;
            background: rgba(255,255,255,0.04); border-radius: 10px;
            cursor: pointer; transition: all 0.2s;
            border: 1px solid rgba(255,255,255,0.06);
        }
        .season-card:hover { border-color: var(--accent); background: rgba(255,255,255,0.08); }
        .season-card img { width: 36px; height: 54px; border-radius: 4px; object-fit: cover; }
        .season-card .info { font-size: 0.82rem; }
        .season-card .info strong { display: block; }
        .season-card .info small { color: var(--text3); }
        .section-title-sm { font-size: 1.1rem; font-weight: 700; margin-bottom: 14px; margin-top: 24px; }
    </style>
</head>
<body>
<div class="scroll-progress" id="scrollProgress"></div>

    <nav class="navbar">
        <div class="nav-container">
            <a href="./" class="logo">BerMovie</a>
            <div class="nav-search">
                <input type="text" id="searchInput" placeholder="Cari film atau series..." autocomplete="off">
                <button id="searchBtn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></button>
            </div>
                        <div class="nav-links">
                <a href="./">Home</a>
                <a href="movies.html">Film</a>
                <a href="tv.html">Series</a>
                <div class="nav-dropdown">
                    <span class="nav-dropdown-trigger">Genre ▾</span>
                    <div class="dropdown-menu" id="genreDropdown"></div>
                </div>
                <div class="nav-dropdown">
                    <span class="nav-dropdown-trigger" data-nav="country">Country ▾</span>
                    <div class="dropdown-menu" id="countryDropdown"></div>
                </div>
                <div class="nav-dropdown">
                    <span class="nav-dropdown-trigger" data-nav="tahun">Tahun ▾</span>
                    <div class="dropdown-menu" id="yearDropdown"></div>
                </div>
                <a href="./?watchlist" class="nav-fav">Favorit</a>
            </div>
            <button class="mobile-menu-btn" id="mobileMenuBtn" style="cursor:pointer;z-index:101;position:relative"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="pointer-events:none"><path d="M3 12h18M3 6h18M3 18h18"/></svg></button>
        </div>
        <!-- Mobile Menu -->
        <div class="mobile-menu" id="mobileMenu">
            <div class="mobile-search">
                <input type="text" id="mobileSearchInput" placeholder="Cari film atau series..." autocomplete="off">
                <button id="mobileSearchBtn" >Cari</button>
            </div>
            <a href="./" data-nav="home"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Home</a>
            <a href="movies.html" data-nav="movies">Film</a>
            <a href="tv.html" data-nav="tv">Series</a>
            <a href="genre.html" data-nav="genre"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>Genre</a>
            <a href="leaderboard.html" data-nav="leaderboard">Peringkat</a>
            <a href="movies.html" data-nav="tahun"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Tahun</a>
            <a href="movies.html" data-nav="country"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>Country</a>
            <a href="./?watchlist" data-nav="watchlist">Favorit</a>
        </div>
    </nav>


    <div class="detail-loading" id="detailLoading">Memuat...</div>

    <div class="detail-page hidden" id="detailPage">
        <div class="detail-hero" id="detailHero">
            <button class="back-btn" id="detailBackBtn" onclick="history.back()">←</button>
        </div>
        <div class="detail-body">
            <h1 id="detailTitle"></h1>
            <div class="detail-meta" id="detailMeta"></div>
            <p class="detail-overview" id="detailOverview"></p>
            <div class="detail-actions">
                <button class="btn-watch" id="detailWatchBtn">Tonton</button>
                <button class="btn-secondary trailer-btn" id="detailTrailerBtn"><span class="t-il"></span><span class="t-txt">Trailer</span><span class="t-ir"></span></button>
                <button class="btn-secondary btn-watchlist" id="detailWatchlistBtn">♥ Tambah ke Watchlist</button>
            </div>
            <!-- TRAILER SECTION -->
            <div class="trailer-section hidden" id="trailerSection">
                <div class="trailer-embed">
                    <iframe id="trailerIframe" allowfullscreen></iframe>
                </div>
            </div>
            <h3 class="section-title-sm">Pemain</h3>
            <div class="detail-cast" id="detailCast"></div>
            <div class="seasons-section hidden" id="detailSeasons">
                <h3 class="section-title-sm">Seasons</h3>
                <div class="seasons-list" id="detailSeasonsList"></div>
            </div>
            <h3 class="section-title-sm">Rekomendasi</h3>
            <div class="carousel" id="detailSimilar"></div>
        </div>
    </div>

    <!-- PLAYER MODAL -->
    <div class="player-modal hidden" id="playerModal">
        <div class="player-backdrop"></div>
        <div class="player-content">
            <div class="player-top">
                <button class="player-back" id="playerBackBtn">&larr;</button>
                <span class="player-title" id="playerTitle"></span>
                <div class="player-top-right">
                    <button class="player-eps-btn hidden" id="playerEpsBtn">&#9776;</button>
                    <button class="player-close" id="playerCloseBtn">&times;</button>
                </div>
            </div>
            <div class="iframe-container">
                <iframe id="playerFrame" src="" frameborder="0" allowfullscreen></iframe>
                <div class="player-controls" id="playerControls">
                    <div class="player-servers" id="playerServers">
                        <button class="svr-btn active" data-server="vesy">Vesy <small>Auto</small></button>
                        <button class="svr-btn" data-server="apiplayer">ApiPlayer <small>Sub Indo</small></button>
                        <button class="svr-btn" data-server="2embed">2Embed <small>1080p</small></button>
                        <button class="svr-btn" data-server="vixsrc">VixSrc <small>HLS</small></button>
                    </div>
                </div>
            </div>
            <div class="episode-sheet hidden" id="episodeSheet">
                <div class="ep-sheet-handle"></div>
                <div class="ep-sheet-header">
                    <h4>Episode</h4>
                    <button class="ep-sheet-close" id="epSheetClose">&times;</button>
                </div>
                <select id="seasonSelect" class="ep-season-select"></select>
                <div class="episodes-grid" id="episodesGrid"></div>
            </div>
        </div>
    </div>

    <script defer src="main.v17.js?v=10"></script>
    <script>
        // Parse URL params
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');
        const type = urlParams.get('type') || 'movie';
        if (id) loadDetailPage(parseInt(id), type);
        else document.getElementById('detailLoading').textContent = 'ID tidak ditemukan';
    </script>
</body>
</html>
