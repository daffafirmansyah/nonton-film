<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail - BerMovie</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Righteous&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.v12.css?v=6">
<link rel="stylesheet" href="futuristic.css?v=1">
<style>
.mobile-menu{position:fixed;top:64px;left:0;right:0;height:calc(100vh - 64px);height:calc(100dvh - 64px);background:#0c0c14!important;backdrop-filter:none!important;-webkit-backdrop-filter:none!important;z-index:99;overflow-y:auto;-webkit-overflow-scrolling:touch;transform:translateX(100%);transition:transform .3s ease}.mobile-menu.open{transform:translateX(0)}.mobile-menu a{display:block;padding:16px 20px;font-size:1rem;font-weight:600;color:#e8e8ef;touch-action:manipulation;border-bottom:1px solid rgba(255,255,255,.06)}.mobile-menu a:last-child{border-bottom:none}.mobile-menu a:active{background:rgba(255,255,255,.06)}.mobile-menu a.active{color:var(--accent)}
</style>
    <style>
        .detail-page { padding-top: var(--nav-height); }
        .detail-hero {
            width: 100%; height: 50vh; min-height: 350px;
            background-size: cover; background-position: center 20%;
            position: relative;
        }
        .detail-cast::-webkit-scrollbar { height: 2px; }
        .detail-cast-item { flex: 0 0 70px; text-align: center; }
        .detail-cast-item img {
            width: 56px; height: 56px; border-radius: 50%; object-fit: cover;
            margin-bottom: 6px; background: #1a1a2e;
            border: 2px solid rgba(255,255,255,0.06);
        }
        .detail-cast-item p {
            font-size: 0.7rem; color: var(--text3);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .detail-loading {
            padding-top: calc(var(--nav-height) + 80px);
            text-align: center; color: var(--text3);
        }
        .back-btn {
            position: absolute; top: 20px; left: 20px; z-index: 10;
            width: 44px; height: 44px; border-radius: 50%;
            background: rgba(0,0,0,0.6); color: white; font-size: 1.3rem;
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer; transition: all 0.2s;
        }
        .back-btn:hover { background: var(--accent); }
        @media (max-width: 768px) {
            .detail-hero { height: 35vh; min-height: 250px; }
            .detail-body { padding: 0 12px 40px; margin-top: -40px; }
            .back-btn { top: 12px; left: 12px; width: 36px; height: 36px; font-size: 1rem; }
        }
        .seasons-list {
            display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px;
        }
        .season-card {
            display: flex; align-items: center; gap: 10px; padding: 10px 14px;
            background: rgba(255,255,255,0.04); border-radius: 10px;
            cursor: pointer; transition: all 0.2s;
            border: 1px solid rgba(255,255,255,0.06);
        }
        .season-card:hover { border-color: var(--accent); background: rgba(255,255,255,0.08); }
        .season-card img { width: 36px; height: 54px; border-radius: 4px; object-fit: cover; }
        .season-card .info { font-size: 0.82rem; }
        .season-card .info strong { display: block; }
        .season-card .info small { color: var(--text3); }
        .section-title-sm { font-size: 1.1rem; font-weight: 700; margin-bottom: 14px; margin-top: 24px; }
        /* Subtitle overlay */
        .sub-overlay {
            position: absolute; bottom: 50px; left: 0; right: 0;
            z-index: 20; pointer-events: none;
            display: flex; flex-direction: column; align-items: center;
            padding: 0 20px 10px;
        }
        .sub-overlay .sub-text {
            background: rgba(0,0,0,0.78); color: #fff;
            padding: 10px 18px; border-radius: 8px;
            font-size: 1.1rem; line-height: 1.4;
            text-align: center; max-width: 90%;
            pointer-events: auto; cursor: pointer;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .sub-overlay .sub-controls {
            display: flex; gap: 8px; align-items: center;
            margin-top: 8px; pointer-events: auto;
        }
        .sub-btn-ctrl {
            background: rgba(0,0,0,0.6); color: #ccc; border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50%; width: 32px; height: 32px;
            font-size: 0.8rem; cursor: pointer; display: flex;
            align-items: center; justify-content: center;
            backdrop-filter: blur(4px); transition: all 0.2s;
        }
        .sub-btn-ctrl:hover { background: var(--accent); color: #fff; }
        .sub-counter { color: #aaa; font-size: 0.75rem; font-weight: 600; min-width: 40px; text-align: center; }
        /* Subtitle sheet */
        .sub-search-status { padding: 16px 20px; color: var(--text3); font-size: 0.85rem; text-align: center; }
        .sub-list { padding: 0 20px 20px; max-height: 50vh; overflow-y: auto; }
        .sub-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 14px; background: rgba(255,255,255,0.04);
            border-radius: 10px; margin-bottom: 8px; cursor: pointer;
            border: 1px solid rgba(255,255,255,0.06); transition: all 0.2s;
        }
        .sub-item:hover { border-color: var(--accent); background: rgba(255,255,255,0.08); }
        .sub-item .sub-item-name { font-size: 0.85rem; color: var(--text2); }
        .sub-item .sub-item-dl { font-size: 0.72rem; color: var(--text3); }
        .sub-item .sub-item-load { font-size: 0.75rem; color: var(--accent); font-weight: 600; }
        .sub-trigger {
            background: rgba(255,255,255,0.06); color: var(--text2);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 6px 12px; border-radius: 8px;
            font-size: 0.78rem; font-weight: 600; cursor: pointer;
            transition: all 0.2s; white-space: nowrap;
        }
        .sub-trigger:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
    </style>
</head>
<body>
<div class="scroll-progress" id="scrollProgress"></div>

    <nav class="navbar">
        <div class="nav-container">
            <a href="./" class="logo">BerMovie</a>
            <div class="nav-search">
                <input type="text" id="searchInput" placeholder="Cari film atau series..." autocomplete="off">
                <button id="searchBtn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></button>
            </div>
                        <div class="nav-links">
                <a href="./">Home</a>
                <a href="movies.html">Film</a>
                <a href="tv.html">Series</a>
                <div class="nav-dropdown">
                    <span class="nav-dropdown-trigger">Genre ▾</span>
                    <div class="dropdown-menu" id="genreDropdown"></div>
                </div>
                <div class="nav-dropdown">
                    <span class="nav-dropdown-trigger">Country ▾</span>
                    <div class="dropdown-menu" id="countryDropdown"></div>
                </div>
                <div class="nav-dropdown">
                    <span class="nav-dropdown-trigger">Tahun ▾</span>
                    <div class="dropdown-menu" id="yearDropdown"></div>
                </div>
                <a href="./?watchlist" class="nav-fav">Favorit</a>
            </div>
            <button class="mobile-menu-btn" id="mobileMenuBtn" style="cursor:pointer;z-index:101;position:relative"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="pointer-events:none"><path d="M3 12h18M3 6h18M3 18h18"/></svg></button>
        </div>
        <!-- Mobile Menu -->
        <div class="mobile-menu" id="mobileMenu">
            <div class="mobile-search">
                <input type="text" id="mobileSearchInput" placeholder="Cari film atau series..." autocomplete="off">
                <button id="mobileSearchBtn" >Cari</button>
            </div>
            <a href="./" data-nav="home">Home</a>
            <a href="movies.html" data-nav="movies">Film</a>
            <a href="tv.html" data-nav="tv">Series</a>
            <a href="genre.html" data-nav="genre">Genre</a>
            <a href="leaderboard.html" data-nav="leaderboard">Peringkat</a>
            <a href="movies.html" data-nav="tahun">Tahun</a>
            <a href="movies.html" data-nav="country">Country</a>
            <a href="./?watchlist" data-nav="watchlist">Favorit</a>
        </div>
    </nav>


    <div class="detail-loading" id="detailLoading">Memuat...</div>

    <div class="detail-page hidden" id="detailPage">
        <div class="detail-hero" id="detailHero">
            <button class="back-btn" id="detailBackBtn" onclick="history.back()">←</button>
        </div>
        <div class="detail-body">
            <h1 id="detailTitle"></h1>
            <div class="detail-meta" id="detailMeta"></div>
            <p class="detail-overview" id="detailOverview"></p>
            <div class="detail-actions">
                <button class="btn-watch" id="detailWatchBtn">Tonton</button>
                <button class="btn-secondary trailer-btn" id="detailTrailerBtn"><span class="t-il"></span><span class="t-txt">Trailer</span><span class="t-ir">▶</span></button>
            </div>
            <h3 class="section-title-sm">Pemain</h3>
            <div class="detail-cast" id="detailCast"></div>
            <div class="seasons-section hidden" id="detailSeasons">
                <h3 class="section-title-sm">Seasons</h3>
                <div class="seasons-list" id="detailSeasonsList"></div>
            </div>
            <h3 class="section-title-sm">Rekomendasi</h3>
            <div class="carousel" id="detailSimilar"></div>
        </div>
    </div>

    <!-- PLAYER MODAL -->
    <div class="player-modal hidden" id="playerModal">
        <div class="player-backdrop"></div>
        <div class="player-content">
            <div class="player-top">
                <button class="player-back" id="playerBackBtn">&larr;</button>
                <span class="player-title" id="playerTitle"></span>
                <div class="player-top-right">
                    <button class="player-eps-btn hidden" id="playerEpsBtn">&#9776;</button>
                    <button class="player-close" id="playerCloseBtn">&times;</button>
                </div>
            </div>
            <div class="iframe-container">
                <iframe id="playerFrame" src="" frameborder="0" allowfullscreen></iframe>
                <div class="player-controls" id="playerControls">
                    <div class="player-servers" id="playerServers">
                        <button class="svr-btn" data-server="vidsrc">VidSrc</button>
                        <button class="svr-btn" data-server="vidlink">VidLink</button>
                        <button class="svr-btn active" data-server="vidcore">VidCore</button>
                        <button class="sub-trigger" id="subTriggerBtn">CC</button>
                    </div>
                </div>
                <!-- Subtitle overlay -->
                <div class="sub-overlay hidden" id="subOverlay">
                    <div class="sub-text" id="subText"></div>
                    <div class="sub-controls">
                        <button class="sub-btn-ctrl" id="subPrevBtn">◀</button>
                        <span class="sub-counter" id="subCounter">0/0</span>
                        <button class="sub-btn-ctrl" id="subNextBtn">▶</button>
                        <button class="sub-btn-ctrl" id="subSyncBtn">↺</button>
                        <button class="sub-btn-ctrl" id="subCloseBtn">✕</button>
                    </div>
                </div>
            </div>
            <div class="episode-sheet hidden" id="episodeSheet">
                <div class="ep-sheet-handle"></div>
                <div class="ep-sheet-header">
                    <h4>Episode</h4>
                    <button class="ep-sheet-close" id="epSheetClose">&times;</button>
                </div>
                <select id="seasonSelect" class="ep-season-select"></select>
                <div class="episodes-grid" id="episodesGrid"></div>
            </div>
            <!-- Subtitle Sheet -->
            <div class="episode-sheet hidden" id="subSheet">
                <div class="ep-sheet-handle"></div>
                <div class="ep-sheet-header">
                    <h4>Subtitle Indonesia</h4>
                    <button class="ep-sheet-close" id="subSheetClose">&times;</button>
                </div>
                <div class="sub-search-status" id="subSearchStatus">Mencari subtitle...</div>
                <div class="sub-list" id="subList"></div>
            </div>
        </div>
    </div>

    <script src="main.v15.js?v=1"></script>
    <script>
        // Parse URL params
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');
        const type = urlParams.get('type') || 'movie';
        if (id) loadDetailPage(parseInt(id), type);
        else document.getElementById('detailLoading').textContent = 'ID tidak ditemukan';
    </script>
</body>
</html>
