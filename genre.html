<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genre - BerMovie</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Righteous&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎬</text></svg>">
    <link rel="stylesheet" href="style.v12.css?v=14">
<link rel="stylesheet" href="modern.css?v=7">
<style>

</style>
</head>
<body>
<div class="scroll-progress" id="scrollProgress"></div>

    <nav class="navbar">
        <div class="nav-container">
            <a href="./" class="logo">BerMovie</a>
            <div class="nav-search">
                <input type="text" id="searchInput" placeholder="Cari film atau series..." autocomplete="off">
                <button id="searchBtn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></button>
            </div>
                        <div class="nav-links">
                <a href="./">Home</a>
                <a href="movies.html">Film</a>
                <a href="tv.html">Series</a>
                <div class="nav-dropdown">
                    <span class="nav-dropdown-trigger">Genre ▾</span>
                    <div class="dropdown-menu" id="genreDropdown"></div>
                </div>
                <div class="nav-dropdown">
                    <span class="nav-dropdown-trigger" data-nav="country">Country ▾</span>
                    <div class="dropdown-menu" id="countryDropdown"></div>
                </div>
                <div class="nav-dropdown">
                    <span class="nav-dropdown-trigger" data-nav="tahun">Tahun ▾</span>
                    <div class="dropdown-menu" id="yearDropdown"></div>
                </div>
                <a href="./?watchlist" class="nav-fav">Favorit</a>
            </div>
            <button class="mobile-menu-btn" id="mobileMenuBtn" style="cursor:pointer"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="pointer-events:none"><path d="M3 12h18M3 6h18M3 18h18"/></svg></button>
        </div>
        <div class="mobile-menu" id="mobileMenu">
            <div class="mobile-search">
                <input type="text" id="mobileSearchInput" placeholder="Cari film atau series..." autocomplete="off">
                <button id="mobileSearchBtn">Cari</button>
            </div>
            <a href="./">Home</a>
            <a href="movies.html">Film</a>
            <a href="tv.html">Series</a>
            <a href="genre.html" class="active" data-nav="genre"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>Genre</a>
            <a href="leaderboard.html" data-nav="peringkat"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>Peringkat</a>
            <a href="movies.html" data-nav="tahun"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Tahun</a>
            <a href="movies.html" data-nav="country"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>Country</a>
            <a href="./?watchlist" data-nav="watchlist">Favorit</a>
        </div>
    </nav>

    <main class="main-content page-content">
        <h1 class="page-title">Jelajahi Genre</h1>
        
        <!-- Genre Type Toggle -->
        <div class="genre-toggle">
            <button class="genre-type-btn active" data-type="movie">Film</button>
            <button class="genre-type-btn" data-type="tv">Series</button>
        </div>

        <!-- Genre Grid -->
        <div class="genre-grid" id="genreGrid"></div>

        <!-- Results after genre selected -->
        <div class="hidden" id="genreResults" style="display:none">
            <div class="genre-results-header">
                <button class="back-to-genres" id="backToGenresBtn">← Kembali</button>
                <h2 id="genreResultsTitle"></h2>
                <div class="filters">
                    <select id="sortFilter">
                        <option value="popularity.desc">Populer</option>
                        <option value="vote_average.desc&vote_count.gte=500">Rating Tertinggi</option>
                        <option value="primary_release_date.desc">Terbaru</option>
                    </select>
                    <select id="yearFilter">
                        <option value="">Semua Tahun</option>
                    </select>
                </div>
            </div>
            <div class="grid" id="resultsGrid"></div>
            <div class="pagination" id="resultsPagination"></div>
        </div>

        <div class="loading hidden" id="loading">Memuat...</div>
    </main>

    <!-- DETAIL MODAL -->
    <div class="modal hidden" id="detailModal">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
            <button class="modal-close">&times;</button>
            <div class="modal-hero" id="modalHero"></div>
            <div class="modal-body">
                <h2 id="modalTitle"></h2>
                <div class="modal-meta" id="modalMeta"></div>
                <p class="modal-overview" id="modalOverview"></p>
                <div class="modal-cast" id="modalCast"></div>
                <div class="modal-actions">
                    <button class="btn-watch" id="modalWatchBtn">Tonton</button>
                    <button class="btn-secondary trailer-btn" id="modalTrailerBtn"><span class="t-il"></span><span class="t-txt">Trailer</span><span class="t-ir"></span></button>
                </div>
                <div class="seasons-section hidden" id="seasonsSection">
                    <h3>Seasons</h3>
                    <div class="seasons-list" id="seasonsList"></div>
                </div>
                <div class="similar-section">
                    <h3>Rekomendasi</h3>
                    <div class="carousel" id="similarCarousel"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- PLAYER MODAL -->
    <div class="player-modal hidden" id="playerModal">
        <div class="player-backdrop"></div>
        <div class="player-content">
            <div class="player-top">
                <button class="player-back" id="playerBackBtn">&larr;</button>
                <span class="player-title" id="playerTitle"></span>
                <div class="player-top-right">
                    <button class="player-eps-btn hidden" id="playerEpsBtn">&#9776;</button>
                    <button class="player-close" id="playerCloseBtn">&times;</button>
                </div>
            </div>
            <div class="iframe-container">
                <iframe id="playerFrame" src="" frameborder="0" allowfullscreen></iframe>
                <div class="player-controls" id="playerControls">
                    <div class="player-servers" id="playerServers">
                        <button class="svr-btn active" data-server="vidlink">VidLink</button>
                        <button class="svr-btn" data-server="apiplayer">ApiPlayer <small>Sub Indo</small></button>
                        <button class="svr-btn" data-server="2embed">2Embed <small>1080p</small></button>
                        <button class="svr-btn" data-server="vesy">Vesy</button>
                        <button class="svr-btn" data-server="vixsrc">VixSrc</button>
                        <button class="svr-btn" data-server="vidsrc2">VidSrc2 <small>1080p</small></button>
                        <button class="svr-btn" data-server="vidsrc">VidSrc <small>720p</small></button>
                    </div>
                </div>
            </div>
            <div class="episode-sheet hidden" id="episodeSheet">
                <div class="ep-sheet-handle"></div>
                <div class="ep-sheet-header">
                    <h4>Episode</h4>
                    <button class="ep-sheet-close" id="epSheetClose">&times;</button>
                </div>
                <select id="seasonSelect" class="ep-season-select"></select>
                <div class="episodes-grid" id="episodesGrid"></div>
            </div>
        </div>
    </div>

<button class="back-top" id="backTop">&uarr;</button>
<div class="toast" id="toast"></div>
    <footer class="site-footer">
        <p>BerMovie — Streaming Film & Series Sub Indo</p>
    </footer>

    <script defer src="main.v17.js?v=11"></script>
</body>
</html>
