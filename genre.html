<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genre - NontonFilm</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="./" class="logo">🎬 NontonFilm</a>
            <div class="nav-search">
                <input type="text" id="searchInput" placeholder="Cari film atau series..." autocomplete="off">
                <button id="searchBtn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></button>
            </div>
            <div class="nav-links">
                <a href="./">Home</a>
                <a href="movies.html">Film</a>
                <a href="tv.html">Series</a>
                <a href="genre.html" class="active">Genre</a>
            </div>
            <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
        </div>
        <div class="mobile-menu hidden" id="mobileMenu">
            <a href="./">🏠 Home</a>
            <a href="movies.html">🎬 Film</a>
            <a href="tv.html">📺 Series</a>
            <a href="genre.html" class="active">🎭 Genre</a>
        </div>
    </nav>

    <main class="main-content page-content">
        <h1 class="page-title">🎭 Jelajahi Genre</h1>
        
        <!-- Genre Type Toggle -->
        <div class="genre-toggle">
            <button class="genre-type-btn active" data-type="movie">🎬 Film</button>
            <button class="genre-type-btn" data-type="tv">📺 Series</button>
        </div>

        <!-- Genre Grid -->
        <div class="genre-grid" id="genreGrid"></div>

        <!-- Results after genre selected -->
        <div class="hidden" id="genreResults">
            <div class="genre-results-header">
                <h2 id="genreResultsTitle"></h2>
                <div class="filters">
                    <select id="sortFilter">
                        <option value="popularity.desc">Populer</option>
                        <option value="vote_average.desc&vote_count.gte=500">Rating Tertinggi</option>
                        <option value="primary_release_date.desc">Terbaru</option>
                    </select>
                    <select id="yearFilter">
                        <option value="">Semua Tahun</option>
                    </select>
                </div>
            </div>
            <div class="grid" id="resultsGrid"></div>
            <div class="pagination" id="resultsPagination"></div>
        </div>

        <div class="loading hidden" id="loading">Memuat...</div>
    </main>

    <!-- DETAIL MODAL -->
    <div class="modal hidden" id="detailModal">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
            <button class="modal-close">&times;</button>
            <div class="modal-hero" id="modalHero"></div>
            <div class="modal-body">
                <h2 id="modalTitle"></h2>
                <div class="modal-meta" id="modalMeta"></div>
                <p class="modal-overview" id="modalOverview"></p>
                <div class="modal-cast" id="modalCast"></div>
                <div class="modal-actions">
                    <button class="btn-watch" id="modalWatchBtn">▶ Tonton</button>
                    <button class="btn-secondary" id="modalTrailerBtn">🎥 Trailer</button>
                </div>
                <div class="seasons-section hidden" id="seasonsSection">
                    <h3>Seasons</h3>
                    <div class="seasons-list" id="seasonsList"></div>
                </div>
                <div class="similar-section">
                    <h3>Rekomendasi</h3>
                    <div class="carousel" id="similarCarousel"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- PLAYER MODAL -->
    <div class="player-modal hidden" id="playerModal">
        <div class="player-backdrop"></div>
        <div class="player-content">
            <button class="player-close">&times;</button>
            <div class="player-header">
                <h3 id="playerTitle"></h3>
                <div class="player-servers">
                    <span>Server:</span>
                    <button class="server-btn active" data-server="vidsrc">VidSrc</button>
                    <button class="server-btn" data-server="2embed">2Embed</button>
                </div>
            </div>
            <div class="episode-selector hidden" id="episodeSelector">
                <select id="seasonSelect"></select>
                <div class="episodes-grid" id="episodesGrid"></div>
            </div>
            <div class="iframe-container">
                <iframe id="playerFrame" src="" frameborder="0" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>🎬 NontonFilm — Streaming Film & Series Sub Indo</p>
    </footer>

    <script src="main.js"></script>
</body>
</html>
